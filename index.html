<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Levi Interiors Staff Panel</title>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body{font-family:'Segoe UI';background:#0f172a;color:#fff;margin:0;}
.header{background:#020617;padding:15px;font-size:20px;font-weight:bold;}
.container{padding:20px;}

.card{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:15px;}

input,select{
  padding:10px;
  margin:5px 0;
  width:100%;
  border:none;
  border-radius:6px;
}

.dashboard{display:flex;gap:10px;flex-wrap:wrap;}
.box{flex:1;min-width:120px;padding:15px;border-radius:10px;text-align:center;}

.pending{background:#f59e0b;}
.cutting{background:#3b82f6;}
.dispatch{background:#10b981;}

.panel{background:#111827;padding:12px;margin:10px 0;border-radius:8px;}

button{padding:6px 10px;border:none;border-radius:6px;margin:5px;cursor:pointer;}
.cut{background:#3b82f6;color:#fff;}
.dis{background:#10b981;color:#fff;}

.progress{height:10px;background:#333;border-radius:10px;overflow:hidden;}
.progress-bar{height:100%;background:#22c55e;}
</style>
</head>

<body>

<div class="header">👷 Levi Interiors — Staff Panel</div>

<div class="container">

<div class="card">
<select id="projectSelect" onchange="loadProject()"></select>
</div>

<div class="card">
<b>Project:</b> <span id="pName"></span><br>
<b>Panels:</b> <span id="pCount"></span><br>
<b>Status:</b> <span id="pStatus"></span>
</div>

<div class="dashboard">
  <div class="box pending">Pending<br><span id="pending">0</span></div>
  <div class="box cutting">Cutting<br><span id="cutting">0</span></div>
  <div class="box dispatch">Dispatch<br><span id="dispatch">0</span></div>
</div>

<div class="card">
  <b>Progress</b>
  <div class="progress"><div id="bar" class="progress-bar"></div></div>
  <div id="progressText"></div>
</div>

<input id="search" placeholder="🔍 Search Panel ID" oninput="loadProject()">

<select id="filter" onchange="loadProject()">
  <option value="all">All</option>
  <option value="pending">Pending</option>
  <option value="cutting">Cutting</option>
  <option value="dispatched">Dispatched</option>
</select>

<div id="list"></div>

</div>

<script>

const API = "https://levi-api-zhbu.onrender.com";
const socket = io(API);
socket.on("refresh", loadProjects);

let projects=[];

// LOAD PROJECTS FROM API
async function loadProjects(){
  let res = await fetch(API+"/api/projects");
  let data = await res.json();

  projects = data.data;

  let select = document.getElementById("projectSelect");
  select.innerHTML = "";

  projects.forEach(p=>{
    select.innerHTML += `<option value="${p._id}">${p.name}</option>`;
  });

  loadProject();
}

// UPDATE STATUS (FIXED)
async function updateStatus(panelId,status){

  let id = document.getElementById("projectSelect").value;

  await fetch(API+"/api/projects/"+id+"/status",{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      panelId:String(panelId).trim(),
      status
    })
  });
}

// LOAD PROJECT
function loadProject(){

  let id = document.getElementById("projectSelect").value;
  let search = document.getElementById("search").value.toLowerCase();
  let filter = document.getElementById("filter").value;

  let project = projects.find(p=>p._id === id);

  let html="";
  let pending=0, cutting=0, dispatch=0;

  project?.panels.forEach(p=>{

    let pid = String(p.id).trim();

    if(search && !pid.toLowerCase().includes(search)) return;
    if(filter !== "all" && p.status !== filter) return;

    let item = p.items[0];

    if(p.status==="pending") pending++;
    if(p.status==="cutting") cutting++;
    if(p.status==="dispatched") dispatch++;

    let display = item.seq
      ? `${item.seq} of ${p.totalGroupQty}`
      : "1";

    html += `
      <div class="panel">
        <b>${pid}</b> — ${p.status}<br>
        <b>${display}</b><br>
        📏 ${item.length} × ${item.width}
        <br>
        <button class="cut" onclick="updateStatus('${pid}','cutting')">✂️ Cutting</button>
        <button class="dis" onclick="updateStatus('${pid}','dispatched')">🚚 Dispatch</button>
      </div>
    `;
  });

  list.innerHTML = html;

  pendingEl.innerText = pending;
  cuttingEl.innerText = cutting;
  dispatchEl.innerText = dispatch;

  let total = pending + cutting + dispatch;
  let done = cutting + dispatch;
  let percent = Math.round((done/total)*100 || 0);

  bar.style.width = percent + "%";
  progressText.innerText = percent + "% Completed";

  // PROJECT INFO
  pName.innerText = project?.name || "-";
  pCount.innerText = project?.panels.length || 0;

  let status = "Pending";
  if(done === total && total > 0) status = "Completed";
  else if(done > 0) status = "In Progress";

  pStatus.innerText = status;
}

const pendingEl = document.getElementById("pending");
const cuttingEl = document.getElementById("cutting");
const dispatchEl = document.getElementById("dispatch");

window.onload = loadProjects;

</script>

</body>
</html>
