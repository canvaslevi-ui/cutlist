<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Staff Panel</title>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:'Segoe UI';background:#0f172a;color:#fff;margin:0;}
.header{background:#020617;padding:15px;font-size:18px;}
.container{padding:15px;}

.card{background:#1e293b;padding:12px;border-radius:10px;margin-bottom:12px;}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}

.panel{
  background:#111827;
  padding:10px;
  border-radius:8px;
  margin:8px 0;
}

button{
  padding:6px;
  border:none;
  border-radius:6px;
  margin:5px;
}

.cut{background:#3b82f6;color:#fff;}
.dis{background:#10b981;color:#fff;}
</style>
</head>

<body>

<div class="header">👷 Staff Panel</div>

<div class="container">

<select id="projectSelect" onchange="loadProject()"></select>

<input id="search" placeholder="Search" oninput="loadProject()">

<select id="filter" onchange="loadProject()">
<option value="all">All</option>
<option value="pending">Pending</option>
<option value="cutting">Cutting</option>
<option value="dispatched">Dispatched</option>
</select>

<div id="list"></div>

</div>

<script>

const API = "https://your-app.onrender.com";
const socket = io(API);

socket.on("refresh", loadProjects);

let projects=[];

// LOAD PROJECTS
async function loadProjects(){
let res=await fetch(API+"/api/projects");
let data=await res.json();

projects=data.data;

let s=projectSelect;
s.innerHTML="";

projects.forEach(p=>{
s.innerHTML+=`<option value="${p._id}">${p.name}</option>`;
});

loadProject();
}

// LOAD PROJECT
function loadProject(){

let id=projectSelect.value;
let search=document.getElementById("search").value.toLowerCase();
let filter=document.getElementById("filter").value;

let p=projects.find(x=>x._id===id);

let html="";

p?.panels.forEach(panel=>{

if(search && !panel.id.toLowerCase().includes(search)) return;
if(filter!=="all" && panel.status!==filter) return;

let i=panel.items[0];

html+=`
<div class="panel">
<b>${panel.id}</b> — ${panel.status}<br>
${i.seq} of ${panel.totalGroupQty}<br>
<button class="cut" onclick="update('${panel.id}','cutting')">Cut</button>
<button class="dis" onclick="update('${panel.id}','dispatched')">Dispatch</button>
</div>
`;
});

list.innerHTML=html;
}

// UPDATE STATUS
async function update(panelId,status){

let id=projectSelect.value;

await fetch(API+"/api/projects/"+id+"/status",{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({panelId,status})
});

}

window.onload=loadProjects;

</script>

</body>
</html>
