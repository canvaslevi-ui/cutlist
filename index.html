<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Levi Interiors Staff Panel</title>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:'Segoe UI';
  background:#0f172a;
  color:#fff;
  margin:0;
}

.header{
  background:#020617;
  padding:15px;
  font-size:18px;
  font-weight:bold;
}

.container{
  padding:15px;
}

.card{
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}

.panel{
  background:#111827;
  padding:12px;
  border-radius:10px;
  margin:10px 0;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  margin:5px;
  cursor:pointer;
}

.cut{background:#3b82f6;color:#fff;}
.dis{background:#10b981;color:#fff;}

.status-pending{border-left:5px solid orange;}
.status-cutting{border-left:5px solid #3b82f6;}
.status-dispatched{border-left:5px solid #10b981;}
</style>
</head>

<body>

<div class="header">👷 Levi Interiors — Staff Panel</div>

<div class="container">

<!-- PROJECT SELECT -->
<div class="card">
  <select id="projectSelect" onchange="loadProject()"></select>
</div>

<!-- SEARCH -->
<input id="search" placeholder="🔍 Search Panel ID" oninput="loadProject()">

<!-- FILTER -->
<select id="filter" onchange="loadProject()">
  <option value="all">All</option>
  <option value="pending">Pending</option>
  <option value="cutting">Cutting</option>
  <option value="dispatched">Dispatched</option>
</select>

<!-- LIST -->
<div id="list"></div>

</div>

<script>

// 🔥 IMPORTANT — YOUR LIVE API
const API = "https://levi-api-zhbu.onrender.com";

// SOCKET
const socket = io(API);
socket.on("refresh", loadProjects);

let projects=[];

// LOAD PROJECTS
async function loadProjects(){
  let res = await fetch(API+"/api/projects");
  let data = await res.json();

  projects = data.data;

  let s = document.getElementById("projectSelect");
  s.innerHTML="";

  projects.forEach(p=>{
    s.innerHTML += `<option value="${p._id}">${p.name}</option>`;
  });

  loadProject();
}

// LOAD PROJECT
function loadProject(){

  let id = document.getElementById("projectSelect").value;
  let search = document.getElementById("search").value.toLowerCase();
  let filter = document.getElementById("filter").value;

  let p = projects.find(x=>x._id === id);

  let html = "";

  p?.panels.forEach(panel=>{

    // SEARCH
    if(search && !panel.id.toLowerCase().includes(search)) return;

    // FILTER
    if(filter !== "all" && panel.status !== filter) return;

    let i = panel.items[0];

    html += `
      <div class="panel status-${panel.status}">
        <b>${panel.id}</b> — ${panel.status}<br>
        <b>Total Pieces: ${i.seq} of ${panel.totalGroupQty}</b><br>
        📏 ${i.length} × ${i.width}

        <br>

        <button class="cut" onclick="updateStatus('${panel.id}','cutting')">✂️ Cutting</button>
        <button class="dis" onclick="updateStatus('${panel.id}','dispatched')">🚚 Dispatch</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

// UPDATE STATUS
async function updateStatus(panelId,status){

  let id = document.getElementById("projectSelect").value;

  await fetch(API+"/api/projects/"+id+"/status",{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({panelId,status})
  });

}

// INIT
window.onload = loadProjects;

</script>

</body>
</html>
