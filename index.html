<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Levi Interiors Staff</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#fff;
}

.header{
  position:sticky;
  top:0;
  background:#020617;
  padding:14px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

.container{padding:12px;}

.card{
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

input,select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  margin-top:6px;
  font-size:16px;
}

.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}

.box{
  padding:12px;
  border-radius:10px;
  text-align:center;
}

.pending{background:#f59e0b;}
.cutting{background:#3b82f6;}
.dispatch{background:#10b981;}

/* 🔥 PANEL */
.panel{
  background:#111827;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  border-left:6px solid;
}

.panel.pending{border-color:#f59e0b;}
.panel.cutting{border-color:#3b82f6;}
.panel.dispatched{border-color:#10b981;}

button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  font-size:14px;
}

.cut{background:#3b82f6;color:#fff;}
.dis{background:#10b981;color:#fff;}

.progress{
  height:8px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin-top:6px;
}

.progress-bar{
  height:100%;
  background:#22c55e;
}
</style>
</head>

<body>

<div class="header">👷 Levi Interiors</div>

<div class="container">

<div class="card">
<select id="projectSelect" onchange="loadProject()"></select>
</div>

<div class="card">
<b id="pName"></b><br>
Panels: <span id="pCount"></span><br>
Status: <span id="pStatus"></span>
</div>

<div class="dashboard">
  <div class="box pending">Pending<br><span id="pending">0</span></div>
  <div class="box cutting">Cutting<br><span id="cutting">0</span></div>
  <div class="box dispatch">Dispatch<br><span id="dispatch">0</span></div>
</div>

<div class="card">
  Progress
  <div class="progress"><div id="bar" class="progress-bar"></div></div>
  <div id="progressText"></div>
</div>

<input id="search" placeholder="Search Panel ID" oninput="loadProject()">

<select id="filter" onchange="loadProject()">
  <option value="all">All</option>
  <option value="pending">Pending</option>
  <option value="cutting">Cutting</option>
  <option value="dispatched">Dispatched</option>
</select>

<div id="list"></div>

</div>

<script>

const API = "https://levi-api-zhbu.onrender.com";
const socket = io(API);

socket.on("refresh", () => {
  loadProjects();
});

// 🔊 SOUND
const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

let projects=[];

// LOAD PROJECTS
async function loadProjects(){
  let res = await fetch(API+"/api/projects");
  let data = await res.json();

  projects = data.data;

  let select = document.getElementById("projectSelect");
  select.innerHTML = "";

  projects.forEach(p=>{
    select.innerHTML += `<option value="${p._id}">${p.name}</option>`;
  });

  loadProject();
}

// UPDATE STATUS
async function updateStatus(panelId,status){

  let id = document.getElementById("projectSelect").value;

  if(!id){
    alert("Select project first");
    return;
  }

  await fetch(API+"/api/projects/"+id+"/status",{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ panelId, status })
  });

  // 🔊 SOUND
  clickSound.play();

  // 📳 VIBRATION
  if(navigator.vibrate){
    navigator.vibrate(100);
  }

  loadProjects();
}

// LOAD PROJECT
function loadProject(){

  let id = document.getElementById("projectSelect").value;
  let search = document.getElementById("search").value.toLowerCase();
  let filter = document.getElementById("filter").value;

  let project = projects.find(p=>p._id === id);

  let html="";
  let pending=0, cutting=0, dispatch=0;

  project?.panels.forEach(p=>{

    let pid = String(p.id).trim();

    if(search && !pid.toLowerCase().includes(search)) return;
    if(filter !== "all" && p.status !== filter) return;

    let item = p.items[0];

    if(p.status==="pending") pending++;
    if(p.status==="cutting") cutting++;
    if(p.status==="dispatched") dispatch++;

    let display = item.seq ? `${item.seq}/${p.totalGroupQty}` : "1";

    html += `
    <div class="panel ${p.status}">
      <div style="display:flex;justify-content:space-between;">
        <b>${pid}</b>
        <span style="
          font-size:11px;
          padding:4px 8px;
          border-radius:6px;
          background:
            ${p.status==="pending" ? "#f59e0b" :
              p.status==="cutting" ? "#3b82f6" :
              "#10b981"};
        ">
          ${p.status.toUpperCase()}
        </span>
      </div>

      <div style="margin-top:6px;">
        ${display}<br>
        ${item.length} × ${item.width}
      </div>

      <div style="display:flex;gap:6px;margin-top:8px;">
        ${p.status === "pending" ? `
          <button class="cut" onclick="updateStatus('${pid}','cutting')">✂️ Cutting</button>
        ` : ""}

        ${p.status !== "dispatched" ? `
          <button class="dis" onclick="updateStatus('${pid}','dispatched')">🚚 Dispatch</button>
        ` : ""}
      </div>
    </div>
    `;
  });

  list.innerHTML = html;

  pendingEl.innerText = pending;
  cuttingEl.innerText = cutting;
  dispatchEl.innerText = dispatch;

  let total = pending + cutting + dispatch;
  let done = cutting + dispatch;
  let percent = Math.round((done/total)*100 || 0);

  bar.style.width = percent + "%";

  if(percent < 40) bar.style.background = "#f59e0b";
  else if(percent < 80) bar.style.background = "#3b82f6";
  else bar.style.background = "#10b981";

  progressText.innerText = percent + "% Done";

  pName.innerText = project?.name || "-";
  pCount.innerText = project?.panels.length || 0;

  let status = "Pending";
  if(done === total && total > 0) status = "Completed";
  else if(done > 0) status = "In Progress";

  pStatus.innerText = status;
}

const pendingEl = document.getElementById("pending");
const cuttingEl = document.getElementById("cutting");
const dispatchEl = document.getElementById("dispatch");

// AUTO REFRESH
setInterval(loadProjects, 10000);

window.onload = loadProjects;

</script>

</body>
</html>
